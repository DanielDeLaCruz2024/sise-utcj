<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SISE - Registro de Estudiante</title>
  <link rel="stylesheet" href="sise_utcj.css">
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <div class="header-top">SISTEMA INTEGRAL DE SERVICIOS ESTUDIANTILES</div>
  <nav class="navbar">
    <a href="sise_utcj.html" class="active">Inicio</a>
    <a href="sise_utcj.html" class="login-btn">Iniciar Sesión</a>
  </nav>
 
  <div class="main-wrapper">
    <div class="register-card">
      <div class="register-header">REGISTRO DE NUEVO USUARIO</div>
      <div class="register-form">
 
        <div class="form-row">
          <label>Matrícula:</label>
          <div class="user-input-wrapper">
            <input type="text" id="reg-matricula" placeholder="23210000">
            <span>@utcj.edu.mx</span>
          </div>
        </div>
 
        <div class="form-row">
          <label>Nombre completo:</label>
          <input type="text" id="reg-nombre" placeholder="Apellido Paterno Materno Nombre(s)" class="input-wide">
        </div>
 
        <div class="form-row">
          <label>Contraseña:</label>
          <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" class="input-wide">
        </div>
 
        <div class="form-row">
          <label>Confirmar:</label>
          <input type="password" id="reg-pass2" placeholder="Repite la contraseña" class="input-wide">
        </div>
 
        <div id="reg-error" style="color:#c0392b;font-size:12px;text-align:center;min-height:18px;margin-bottom:6px;"></div>
        <div id="reg-success" style="color:#4a7c3f;font-size:12px;text-align:center;min-height:18px;margin-bottom:6px;"></div>
 
        <div class="btn-row">
          <button class="btn-login" id="btn-register">REGISTRARSE</button>
          <a href="sise_utcj.html" class="btn-forgot">Ya tengo cuenta</a>
        </div>
      </div>
    </div>
  </div>
 
  <div class="footer">Universidad Tecnologica de Ciudad Juarez © 03-2020-131211374200-01</div>
 
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="register.js"></script>
</body>
</html>
